title: CertUtil URLcache Flag Abuse (LOLBIN File Download)
id: 7a3e1b2c-4f5d-4a8e-9c1b-2d3e4f5a6b7c
status: stable
description: >
    Detects certutil.exe invoked with -urlcache flag, a common Living Off the Land
    technique used by attackers to download files using a trusted Windows binary.
    Legitimate certutil usage does not typically require the -urlcache flag.
references:
    - https://attack.mitre.org/techniques/T1105/
    - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: Blue Team Detection Lab
date: 2024-01-01
tags:
    - attack.t1105
    - attack.defense_evasion
    - attack.t1218
    - lolbin
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\certutil.exe'
    selection_cli:
        CommandLine|contains|all:
            - '-urlcache'
            - '-f'
    condition: selection_img and selection_cli
falsepositives:
    - Legitimate PKI/certificate management scripts (rare)
    - SCCM or software deployment that uses certutil for certificate installation
    - Verify against change management records
level: high
fields:
    - CommandLine
    - ParentImage
    - ParentCommandLine
    - User
    - Image

---
# Variant: also catches split flag usage and alternate ordering
title: CertUtil URLcache Abuse — Variant (split flag)
id: 8b4f2c3d-5e6a-4b9f-ad2c-3e4f5a6b7c8d
status: stable
description: >
    Variant rule catching certutil -urlcache with -split flag (splits download
    into chunks). Same LOLBIN technique, different flag combination.
references:
    - https://attack.mitre.org/techniques/T1105/
author: Blue Team Detection Lab
date: 2024-01-01
tags:
    - attack.t1105
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\certutil.exe'
        CommandLine|contains: '-urlcache'
    selection_split:
        CommandLine|contains: '-split'
    condition: selection and selection_split
falsepositives:
    - Extremely rare in legitimate use
level: high
